  description: Outbound webhooks configured under Settings then Integrations. When a
    payment is completed, Zeffy sends an HTTP POST with the full payment details to
    the organization's configured URL, enabling thank-you workflows, CRM/accounting
    sync, and internal notifications. This is Zeffy-to-consumer HTTP notification,
    not an inbound API surface.
