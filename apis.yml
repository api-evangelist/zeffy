aid: zeffy
url: https://raw.githubusercontent.com/api-evangelist/zeffy/refs/heads/main/apis.yml
name: Zeffy
kind: company
description: Zeffy is a 100% free fundraising platform for nonprofits - donation
  forms, event ticketing, peer-to-peer campaigns, memberships, e-commerce, and
  donor management - with no platform, transaction, or credit-card fees, funded
  entirely by optional tips from donors. Zeffy exposes a free public REST API that
  gives organization admins read-only access to their Payments, Contacts, and
  Campaigns data (base https://api.zeffy.com/api/v1), authenticated with a
  per-organization API key sent as a Bearer token, plus outbound webhooks that POST
  payment details to a configured URL when a payment is completed. Zeffy also
  integrates via Zapier, QuickBooks, and WordPress.
