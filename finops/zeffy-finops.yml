description: >-
  FinOps view of Zeffy spend. Zeffy is unusual: it charges nonprofits nothing -
  no platform, transaction, or credit-card fees - and the public API and
  webhooks are free with no per-request charges. Zeffy is funded by optional
  tips left by donors at checkout. From a nonprofit consumer's perspective there
  is effectively no vendor invoice for using Zeffy or its API; the only
  "cost" is the optional donor tip, which is a donor-side choice rather than a
  billed line item to the organization.
notes: >-
  There is no metered API cost to allocate or optimize. Verify current terms on
  zeffy.com.
