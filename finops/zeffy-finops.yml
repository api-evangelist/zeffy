  - account
  - apiKey
- name: donor_tips
  description: Optional tips donors leave at checkout that fund Zeffy; donor-side, not billed to the nonprofit.
  unit: currency
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track API usage against the 100 req/min limit; there is no monetary cost to attribute.
- name: Allocation
  description: No billed API cost to allocate across teams or workloads.
- name: Optimization
  description: Optimize for rate-limit headroom (batch reads, paginate efficiently) rather than for cost.
- name: Accountability
  description: Owners monitor API key usage and webhook reliability; there is no vendor invoice to reconcile.
